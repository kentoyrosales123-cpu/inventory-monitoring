<!doctype html>
<html>
  <head>
    <title>Refill Requests</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Inventory</h2>
          <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        </div>

        <nav id="navMenu"></nav>

        <div class="sidebar-footer">
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </aside>
      <main class="main">
        <div class="topbar">
          <h1>Refill Requests</h1>
        </div>

        <div class="panel">
          <h2>Requests</h2>
          <table>
            <thead>
              <tr>
                <th>Branch</th>
                <th>Product</th>
                <th>Current</th>
                <th>Requested</th>
                <th>Urgency</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="requestTable"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="main.js"></script>
    <script>
      protectPage();

      async function loadRequests() {
        const user = getUser();
        const data = await apiRequest("/refill-requests");

        requestTable.innerHTML = data
          .map(
            (r) => `
    <tr>
      <td>${r.branch?.branchName || ""}</td>
      <td>${r.product?.productName || ""}</td>
      <td>${r.currentStock}</td>
      <td>${r.requestedQuantity}</td>
      <td>${r.urgencyLevel}</td>
      <td>${r.status}</td>
      <td>
        ${
          user.role === "admin"
            ? `
          <button onclick="updateStatus('${r._id}', 'Approved')">Approve</button>
          <button onclick="deliver('${r._id}', ${r.requestedQuantity})">Delivered</button>
          <button onclick="updateStatus('${r._id}', 'Cancelled')">Cancel</button>
        `
            : "-"
        }
      </td>
    </tr>
  `,
          )
          .join("");
      }

      async function updateStatus(id, status) {
        await apiRequest(`/refill-requests/${id}/status`, "PUT", { status });
        loadRequests();
      }

      async function deliver(id, qty) {
        const deliveredQuantity = prompt("Delivered quantity:", qty);
        if (!deliveredQuantity) return;

        await apiRequest(`/refill-requests/${id}/status`, "PUT", {
          status: "Delivered",
          deliveredQuantity: Number(deliveredQuantity),
        });

        loadRequests();
      }

      loadRequests();
    </script>
  </body>
</html>
