<!doctype html>
<html>
  <head>
    <title>Refill Requests</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Inventory</h2>
          <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        </div>

        <nav id="navMenu"></nav>

        <div class="sidebar-footer">
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <h1>Refill Requests</h1>
        </div>

        <div class="panel">
          <h2>Requests</h2>

          <table>
            <thead>
              <tr>
                <th>Branch</th>
                <th>Product</th>
                <th>Current</th>
                <th>Requested</th>
                <th>Urgency</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="requestTable"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="main.js"></script>

    <script>
      protectPage();

      async function loadRequests() {
        const user = getUser();
        const data = await apiRequest("/refill-requests");

        requestTable.innerHTML = data
          .map(
            (r) => `
              <tr>
                <td>${r.branch?.branchName || ""}</td>
                <td>${r.product?.productName || ""}</td>
                <td>${r.currentStock}</td>
                <td>${r.requestedQuantity}</td>
                <td>${r.urgencyLevel}</td>
                <td>${statusBadge(r.status)}</td>
                <td>${renderActions(r, user)}</td>
              </tr>
            `,
          )
          .join("");
      }

      function renderActions(request, user) {
        if (user.role === "admin") {
          if (request.status === "Pending") {
            return `
              <button onclick="updateStatus('${request._id}', 'Approved')">
                Approve
              </button>

              <button onclick="updateStatus('${request._id}', 'Cancelled')">
                Cancel
              </button>
            `;
          }

          if (request.status === "Approved") {
            return `
              <button onclick="updateStatus('${request._id}', 'Out for Delivery')">
                Out for Delivery
              </button>

              <button onclick="updateStatus('${request._id}', 'Cancelled')">
                Cancel
              </button>
            `;
          }

          if (request.status === "Out for Delivery") {
            return `
              <span class="status-note">
                Waiting branch acknowledgment
              </span>
            `;
          }

          if (request.status === "Delivered") {
            return `
              <span class="status-note success">
                Delivered
              </span>
            `;
          }

          return "-";
        }

        if (user.role === "staff") {
          if (request.status === "Out for Delivery") {
            return `
              <button onclick="acknowledgeDelivery('${request._id}')">
                Acknowledge Received
              </button>
            `;
          }

          if (request.status === "Approved") {
            return `
              <span class="status-note">
                Approved - waiting for delivery
              </span>
            `;
          }

          if (request.status === "Pending") {
            return `
              <span class="status-note">
                Waiting admin approval
              </span>
            `;
          }

          if (request.status === "Delivered") {
            return `
              <span class="status-note success">
                Received
              </span>
            `;
          }

          return "-";
        }

        return "-";
      }

      async function updateStatus(id, status) {
        if (!confirm(`Update request to "${status}"?`)) return;

        await apiRequest(`/refill-requests/${id}/status`, "PUT", {
          status,
        });

        loadRequests();
      }

      async function acknowledgeDelivery(id) {
        if (!confirm("Confirm that this delivery is already on hand?")) return;

        await apiRequest(`/refill-requests/${id}/acknowledge`, "PUT");

        alert("Delivery acknowledged. Inventory updated.");

        loadRequests();
      }

      function statusBadge(status) {
        let cls = "status-badge";

        if (status === "Pending") cls += " pending";
        if (status === "Approved") cls += " approved";
        if (status === "Out for Delivery") cls += " delivery";
        if (status === "Delivered") cls += " delivered";
        if (status === "Cancelled") cls += " cancelled";

        return `<span class="${cls}">${status}</span>`;
      }

      loadRequests();
    </script>
  </body>
</html>
