<!doctype html>
<html>
  <head>
    <title>Products</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Inventory</h2>
          <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
        </div>

        <nav id="navMenu"></nav>

        <div class="sidebar-footer">
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </aside>
      <main class="main">
        <div class="topbar">
          <h1>Products</h1>
        </div>

        <div class="panel">
          <h2>Add Product</h2>
          <form id="productForm" class="form-grid">
            <input id="productName" placeholder="Product Name" required />
            <input id="sku" placeholder="SKU / Code" required />
            <input id="category" placeholder="Category" required />
            <input id="unitType" placeholder="Unit Type" required />
            <input
              id="supplierCost"
              type="number"
              placeholder="Supplier Cost"
            />
            <input
              id="sellingPrice"
              type="number"
              placeholder="Selling Price"
            />
            <input
              id="minimumStockLevel"
              type="number"
              placeholder="Minimum Stock Level"
            />
            <button type="submit">Save Product</button>
          </form>
        </div>

        <div class="panel">
          <h2>Product List</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>SKU</th>
                <th>Category</th>
                <th>Min Stock</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="productTable"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="main.js"></script>

    <script>
      protectPage();

      async function loadProducts() {
        try {
          const products = await apiRequest("/products");

          document.getElementById("productTable").innerHTML = products
            .map(
              (p) => `
          <tr>
            <td>${p.productName}</td>
            <td>${p.sku}</td>
            <td>${p.category}</td>
            <td>${p.minimumStockLevel}</td>
            <td>${p.status}</td>
            <td>
              <button onclick="deleteProduct('${p._id}')">
                Delete
              </button>
            </td>
          </tr>
        `,
            )
            .join("");
        } catch (error) {
          console.error(error);
        }
      }

      document
        .getElementById("productForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          try {
            const payload = {
              productName: document.getElementById("productName").value.trim(),

              sku: document.getElementById("sku").value.trim(),

              category: document.getElementById("category").value.trim(),

              unitType: document.getElementById("unitType").value.trim(),

              supplierCost: Number(
                document.getElementById("supplierCost").value || 0,
              ),

              sellingPrice: Number(
                document.getElementById("sellingPrice").value || 0,
              ),

              minimumStockLevel: Number(
                document.getElementById("minimumStockLevel").value || 0,
              ),
            };

            await apiRequest("/products", "POST", payload);

            alert("Product added successfully");

            document.getElementById("productForm").reset();

            loadProducts();
          } catch (error) {
            console.error(error);
          }
        });

      async function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;

        try {
          await apiRequest(`/products/${id}`, "DELETE");

          loadProducts();
        } catch (error) {
          console.error(error);
        }
      }

      loadProducts();
    </script>
  </body>
</html>
